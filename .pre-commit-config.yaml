# lint.yml runs `pre-commit run --all-files`, so this config is the CI gate too:
# a hook added here is gated in CI with no workflow edit. pytest (tests.yml)
# stays a separate CI job — too slow for the per-commit path.
#
# Vendored, minified third-party assets are verbatim upstream bytes — never
# reformat or hygiene-fix them.
exclude: '^semantic_code_review/viewer/assets/vendor/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
      - id: ruff-format

  # pyright resolves against the project's own deps, so it runs in the lint env
  # via `uv run`; `--group lint` provisions it on demand. Whole-project (include
  # set in pyproject), so pass_filenames: false; fires on any staged .py.
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --group lint pyright
        language: system
        files: \.py$
        pass_filenames: false
