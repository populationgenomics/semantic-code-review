name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token, no cloud
# credentials. The PyPI project's trusted publisher must reference this repo,
# this workflow filename (release.yml), and the `pypi` environment. Triggered
# on a published GitHub Release; the tag (vX.Y.Z) must match pyproject's
# version (guarded below).
#
# The viewer ships a compiled TypeScript bundle (boot.ts -> viewer.js) as
# package data, so the build job runs `npm run build` before `uv build`. A
# wheel install therefore needs no Node at runtime.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Publishing a version is irreversible, so fail loudly if the release tag
      # (vX.Y.Z) doesn't match the version in pyproject.toml.
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv version --short)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match pyproject version '$pkg'"
            exit 1
          fi

      # Upstream 0.17.0 switched the viewer toolchain to an esbuild bundle
      # (boot.ts -> viewer.js) pulling every TS module under assets/. The wheel
      # ships the built bundle as package_data; the test confirms it landed
      # before we hand off to the build backend.
      - name: Compile TypeScript viewer bundle
        run: |
          npm ci --ignore-scripts
          npm run build
          test -f semantic_code_review/viewer/assets/viewer.js

      - name: Build wheel + sdist
        run: |
          uv build
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The trusted-publisher and OIDC scope both key off this environment name.
    environment: pypi
    permissions:
      id-token: write # mint the OIDC token PyPI exchanges for an upload token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
