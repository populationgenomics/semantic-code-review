name: lint

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  push:
    branches: [main]

jobs:
  pre-commit:
    # Runs every hook in .pre-commit-config.yaml — the whole static-check gate
    # (ruff, ruff-format, pyright, hygiene). Skip draft PRs.
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Pre-sync the lint env so the pyright hook's `uv run` is a no-op.
      - run: uv sync --locked --group lint --python 3.12
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv run pre-commit run --all-files --show-diff-on-failure

  viewer:
    # The viewer TypeScript ships in the published wheel (release.yml bundles
    # it), so it never runs through Python CI. Typecheck and unit-test it here.
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run test:js
